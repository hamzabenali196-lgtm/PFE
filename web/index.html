<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Robot Spider Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --panel: #ffffff;
      --panel-2: #f8faf9;
      --border: #d8e0dd;
      --text: #162126;
      --muted: #687570;
      --green: #12845a;
      --red: #d04a4a;
      --amber: #ad741f;
      --blue: #2b6fb3;
      --teal: #15847f;
      --shadow: 0 14px 34px rgba(32, 52, 57, .1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eef7f5 0, #fbf7ef 330px, var(--bg) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    button, input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
      align-items: start;
      min-height: 100vh;
      padding: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    h1, h2, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.35rem, 3vw, 2rem);
      font-weight: 750;
    }

    h2 {
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 8px 18px rgba(32, 52, 57, .07);
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 16px currentColor;
    }

    .connected .dot { background: var(--green); }
    .offline .dot, .error .dot { background: var(--red); }

    .stage {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #10171b;
      min-height: 0;
      width: 100%;
      aspect-ratio: var(--video-ratio, 4 / 3);
      display: grid;
      place-items: center;
      position: relative;
    }

    .stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .metric {
      display: grid;
      gap: 4px;
      padding: 12px;
      border-radius: 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .metric:last-child {
      margin-bottom: 0;
    }

    .label {
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .value {
      min-height: 1.5em;
      font-size: 1.05rem;
      word-break: break-word;
    }

    .alert {
      color: var(--red);
      font-weight: 700;
    }

    .photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #f3f6f5;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions button, .actions a {
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(32, 52, 57, .07);
    }

    .actions button:hover, .actions a:hover {
      border-color: var(--blue);
      background: #f5fbff;
      color: #123f68;
    }

    .drive-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .drive-actions button {
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      display: inline-grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(32, 52, 57, .07);
    }

    .drive-actions button:first-child {
      grid-column: 2;
    }

    .drive-actions button:nth-child(2) {
      grid-column: 1;
    }

    .drive-actions button:nth-child(3) {
      grid-column: 2;
    }

    .drive-actions button:nth-child(4) {
      grid-column: 3;
    }

    .drive-actions button:hover,
    .drive-actions button.active {
      border-color: rgba(18, 132, 90, .45);
      background: #effaf5;
      color: var(--green);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 0;
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 10px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section>
      <div class="topbar">
        <div>
          <h1>Robot Spider</h1>
          <p class="label">Live detection dashboard</p>
        </div>
        <div id="status" class="status">
          <span class="dot"></span>
          <span id="statusText">Connecting...</span>
        </div>
      </div>

      <div class="stage">
        <img id="frame" alt="Live robot camera feed" />
        <div id="empty" class="empty">Waiting for live frames from MQTT topic robot/flux</div>
      </div>
    </section>

    <aside class="side">
      <section class="panel">
        <h2>Detection</h2>
        <div class="metric">
          <span class="label">Last alert</span>
          <span id="voiceAlert" class="value">No alert received</span>
        </div>
        <div class="metric">
          <span class="label">Frames received</span>
          <span id="frameCount" class="value">0</span>
        </div>
        <div class="metric">
          <span class="label">Last frame</span>
          <span id="lastFrame" class="value">-</span>
        </div>
      </section>

      <section class="panel">
        <h2>Alert Photo</h2>
        <img id="photo" class="photo" alt="Latest alert snapshot" />
      </section>

      <section class="panel">
        <h2>Location</h2>
        <div class="metric">
          <span class="label">Coordinates</span>
          <span id="coords" class="value">No position received</span>
        </div>
        <div class="actions">
          <a id="mapLink" href="#" target="_blank" rel="noreferrer">Map</a>
          <button id="speakToggle" type="button" aria-pressed="true">Voice on</button>
        </div>
      </section>

      <section class="panel">
        <h2>Drive</h2>
        <div class="drive-actions">
          <button type="button" data-key="z" data-command="left">Z</button>
          <button type="button" data-key="q" data-command="run">Q</button>
          <button type="button" data-key="s" data-command="right">S</button>
          <button type="button" data-key="d" data-command="backward">D</button>
        </div>
        <div class="metric">
          <span class="label">Last command</span>
          <span id="commandStatus" class="value">No command sent</span>
        </div>
      </section>
    </aside>
  </main>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const topics = [
      'robot/flux',
      'robot/alerte_vocale',
      'robot/detection',
      'robot/photo',
      'robot/localisation'
    ];

    const statusBox = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const frame = document.getElementById('frame');
    const empty = document.getElementById('empty');
    const voiceAlert = document.getElementById('voiceAlert');
    const frameCount = document.getElementById('frameCount');
    const lastFrame = document.getElementById('lastFrame');
    const photo = document.getElementById('photo');
    const coords = document.getElementById('coords');
    const mapLink = document.getElementById('mapLink');
    const speakToggle = document.getElementById('speakToggle');
    const driveButtons = [...document.querySelectorAll('.drive-actions button')];
    const commandStatus = document.getElementById('commandStatus');

    let frames = 0;
    let voiceEnabled = true;
    let activeDriveKey = '';

    const brokerHost = location.hostname || 'localhost';
    const apiProtocol = location.protocol.startsWith('http') ? location.protocol : 'http:';
    const apiUrl = `${apiProtocol}//${brokerHost}:4000`;
    const wsUrl = `ws://${brokerHost}:9001`;
    const client = window.mqtt ? mqtt.connect(wsUrl, { reconnectPeriod: 2000 }) : null;

    function setStatus(state, message) {
      statusBox.className = `status ${state}`;
      statusText.textContent = message;
    }

    function nowLabel() {
      return new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function showBase64Image(img, payload) {
      img.src = `data:image/jpeg;base64,${payload.toString()}`;
    }

    frame.addEventListener('load', () => {
      if (!frame.naturalWidth || !frame.naturalHeight) return;
      frame.parentElement.style.setProperty(
        '--video-ratio',
        `${frame.naturalWidth} / ${frame.naturalHeight}`
      );
    });

    function speak(text) {
      if (!voiceEnabled || !('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
    }

    async function postRobotCommand(command) {
      try {
        const response = await fetch(`${apiUrl}/api/robot/command`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || 'Command failed');
        commandStatus.textContent = `${command} sent at ${nowLabel()}`;
        commandStatus.classList.remove('alert');
      } catch (error) {
        commandStatus.textContent = `Command failed: ${error.message}`;
        commandStatus.classList.add('alert');
      }
    }

    async function startDriveCommand(button) {
      const command = button.dataset.command;
      if (!command) return;
      if (activeDriveKey === button.dataset.key) return;

      activeDriveKey = button.dataset.key;
      button.classList.add('active');
      await postRobotCommand(`start:${command}`);
    }

    async function stopDriveCommand(button) {
      if (activeDriveKey !== button.dataset.key) return;

      activeDriveKey = '';
      button.classList.remove('active');
      await postRobotCommand('stand');
    }

    if (client) {
      client.on('connect', () => {
        setStatus('connected', `Connected to ${wsUrl}`);
        topics.forEach((topic) => client.subscribe(topic));
      });

      client.on('reconnect', () => setStatus('', 'Reconnecting...'));
      client.on('offline', () => setStatus('offline', 'Offline'));
      client.on('error', (err) => setStatus('error', `Error: ${err.message || err}`));

      client.on('message', (topic, payload) => {
        const text = payload.toString();

        if (topic === 'robot/flux') {
          showBase64Image(frame, payload);
          empty.style.display = 'none';
          frames += 1;
          frameCount.textContent = frames;
          lastFrame.textContent = nowLabel();
        }

        if (topic === 'robot/alerte_vocale' || topic === 'robot/detection') {
          voiceAlert.textContent = text;
          voiceAlert.classList.add('alert');
          speak(text);
        }

        if (topic === 'robot/photo') {
          showBase64Image(photo, payload);
        }

        if (topic === 'robot/localisation') {
          coords.textContent = text;
          mapLink.href = `https://www.google.com/maps?q=${encodeURIComponent(text)}`;
        }
      });
    } else {
      setStatus('offline', 'MQTT browser client unavailable');
    }

    speakToggle.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      speakToggle.textContent = voiceEnabled ? 'Voice on' : 'Voice off';
      speakToggle.setAttribute('aria-pressed', String(voiceEnabled));
      if (!voiceEnabled && 'speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    });

    driveButtons.forEach((button) => {
      button.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        button.setPointerCapture?.(event.pointerId);
        startDriveCommand(button);
      });
      button.addEventListener('pointerup', (event) => {
        event.preventDefault();
        button.releasePointerCapture?.(event.pointerId);
        stopDriveCommand(button);
      });
      button.addEventListener('pointercancel', (event) => {
        event.preventDefault();
        stopDriveCommand(button);
      });
      button.addEventListener('pointerleave', (event) => {
        event.preventDefault();
        stopDriveCommand(button);
      });
    });

    window.addEventListener('keydown', (event) => {
      if (event.repeat) return;

      const key = event.key.toLowerCase();
      const button = driveButtons.find((item) => item.dataset.key === key);
      if (!button) return;

      event.preventDefault();
      startDriveCommand(button);
    });

    window.addEventListener('keyup', (event) => {
      const key = event.key.toLowerCase();
      const button = driveButtons.find((item) => item.dataset.key === key);
      if (!button) return;

      event.preventDefault();
      stopDriveCommand(button);
    });

    window.addEventListener('blur', () => {
      const button = driveButtons.find((item) => item.dataset.key === activeDriveKey);
      if (button) {
        stopDriveCommand(button);
      }
    });
  </script>
</body>
</html>
